services:
  # ── noti-server (production-ready) ─────────────────────────────
  noti-server:
    build: .
    container_name: noti-server
    restart: unless-stopped
    profiles: ["prod", "default"]
    ports:
      - "${NOTI_PORT:-3000}:3000"
    volumes:
      - noti-data:/data
    environment:
      NOTI_HOST: "0.0.0.0"
      NOTI_PORT: "3000"
      NOTI_LOG_FORMAT: "json"
      NOTI_LOG_LEVEL: "${NOTI_LOG_LEVEL:-info}"
      NOTI_QUEUE_BACKEND: "sqlite"
      NOTI_QUEUE_DB_PATH: "/data/noti-queue.db"
      NOTI_WORKER_COUNT: "${NOTI_WORKER_COUNT:-4}"
      NOTI_API_KEYS: "${NOTI_API_KEYS:-}"
      NOTI_RATE_LIMIT_MAX: "${NOTI_RATE_LIMIT_MAX:-100}"
      NOTI_RATE_LIMIT_WINDOW_SECS: "${NOTI_RATE_LIMIT_WINDOW_SECS:-60}"
      NOTI_RATE_LIMIT_PER_IP: "${NOTI_RATE_LIMIT_PER_IP:-true}"
      NOTI_CORS_ALLOWED_ORIGINS: "${NOTI_CORS_ALLOWED_ORIGINS:-*}"
      NOTI_MAX_BODY_SIZE: "${NOTI_MAX_BODY_SIZE:-2097152}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── noti-server (development) ──────────────────────────────────
  # Usage: docker compose --profile dev up
  # - In-memory queue (faster, no persistence)
  # - Human-readable text logs
  # - No authentication
  # - Verbose debug logging
  noti-dev:
    build: .
    container_name: noti-dev
    profiles: ["dev"]
    ports:
      - "${NOTI_PORT:-3000}:3000"
    environment:
      NOTI_HOST: "0.0.0.0"
      NOTI_PORT: "3000"
      NOTI_LOG_FORMAT: "text"
      NOTI_LOG_LEVEL: "debug"
      NOTI_QUEUE_BACKEND: "memory"
      NOTI_WORKER_COUNT: "2"
      NOTI_API_KEYS: ""
      NOTI_RATE_LIMIT_MAX: "1000"
      NOTI_RATE_LIMIT_WINDOW_SECS: "60"
      NOTI_RATE_LIMIT_PER_IP: "false"
      NOTI_CORS_ALLOWED_ORIGINS: "*"
      NOTI_MAX_BODY_SIZE: "10485760"

volumes:
  noti-data:
