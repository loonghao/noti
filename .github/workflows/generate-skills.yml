name: Generate Skills

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/package_openclaw_skill.py"
      - ".github/workflows/generate-skills.yml"
      - "justfile"
      - "vx.toml"
  push:
    paths:
      - "skills/**"
      - "scripts/package_openclaw_skill.py"
      - ".github/workflows/generate-skills.yml"
      - "justfile"
      - "vx.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generate-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-skills:
    name: Package Skills
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.15"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-0.8.15-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Package skills
        run: vx just package-skills

      - name: Upload packaged skill artifacts
        uses: actions/upload-artifact@v7
        with:
          name: skill-packages
          path: dist/skills/*.zip
          if-no-files-found: error

  publish-to-clawhub:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    needs: package-skills
    # Only publish on pushes to main (not PRs, not feature branches)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Extract project version
        id: version
        run: |
          version=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish skills to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CLAWHUB_DISABLE_TELEMETRY: "1"
          SKILL_VERSION: ${{ steps.version.outputs.version }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN"
          for skill_dir in skills/*/; do
            skill_name="$(basename "$skill_dir")"
            if [ ! -f "${skill_dir}SKILL.md" ]; then
              echo "SKIP: ${skill_name} has no SKILL.md"
              continue
            fi
            echo "Publishing skill: ${skill_name} v${SKILL_VERSION}"
            clawhub publish "${skill_dir}" \
              --owner "noti-cli" \
              --slug "${skill_name}" \
              --name "${skill_name}" \
              --version "${SKILL_VERSION}" \
              --no-input
            echo "Published: ${skill_name}"
          done
